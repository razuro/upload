<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Uploadcare JS Minimal Example</title>
    <meta
      name="description"
      content="Uploading files with HTML and JS using Uploadcare"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script type="module" src="./minimal.js"></script>
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@uploadcare/file-uploader@1/web/uc-file-uploader-regular.min.css"
>
  </head>
  <body>
    <uc-config ctx-name="my-uploader" pubkey="a6ca334c3520777c0045"></uc-config>
    <uc-file-uploader-minimal ctx-name="my-uploader" class="uc-light"></uc-file-uploader-minimal>
    <uc-upload-ctx-provider
      ctx-name="my-uploader"
      id="my-uploader-provider"
    ></uc-upload-ctx-provider>

    <div class="previews" id="previews"></div>
  </body>
</html>
